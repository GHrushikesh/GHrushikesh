<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="card-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ea043" />
      <stop offset="100%" stop-color="#0969da" />
    </linearGradient>
  </defs>
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #8b949e; line-height: 1.4; }
    .tag { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 9px; font-weight: 600; }
    .badge { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 9px; font-weight: 600; fill: #8b949e; }
  </style>

  <!-- Background -->
  <rect width="280" height="180" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  
  <!-- Accent top border -->
  <path d="M 1 10 A 9 9 0 0 1 10 1 L 270 1 A 9 9 0 0 1 279 10 L 279 4 L 1 4 Z" fill="url(#card-accent)"/>

  <!-- Icon and Header -->
  <!-- Database Icon -->
  <g transform="translate(16, 18)" stroke="#58a6ff" stroke-width="1.5" fill="none">
    <!-- Top cylinder ellipse -->
    <ellipse cx="12" cy="6" rx="6" ry="2" fill="#58a6ff" opacity="0.3"/>
    <!-- Middle cylinder segment -->
    <path d="M 6 6 L 6 12 A 6 2 0 0 0 18 12 L 18 6" />
    <path d="M 6 12 A 6 2 0 0 0 18 12" opacity="0.5"/>
    <!-- Bottom cylinder segment -->
    <path d="M 6 12 L 6 18 A 6 2 0 0 0 18 18 L 18 12" />
    <path d="M 6 18 A 6 2 0 0 0 18 18" opacity="0.5"/>
  </g>
  <text x="44" y="32" class="title">Database Visualizer</text>
  
  <!-- Public Badge -->
  <rect x="222" y="21" width="42" height="16" rx="8" fill="#1f242c" stroke="#30363d" stroke-width="1"/>
  <text x="243" y="32" class="badge" text-anchor="middle">Public</text>

  <!-- Description -->
  <text x="16" y="65" class="desc">Real-time schema visualizer that</text>
  <text x="16" y="82" class="desc">renders entity relations &amp; indexes</text>
  <text x="16" y="99" class="desc">for SQL and NoSQL databases.</text>

  <!-- Divider -->
  <line x1="16" y1="122" x2="264" y2="122" stroke="#21262d" stroke-width="1"/>

  <!-- Tags -->
  <!-- Tag 1: Python -->
  <g transform="translate(16, 134)">
    <rect width="52" height="18" rx="4" fill="#1a3b23" stroke="#2ea043" stroke-width="0.5"/>
    <text x="26" y="12" class="tag" fill="#2ea043" text-anchor="middle">Python</text>
  </g>

  <!-- Tag 2: MySQL -->
  <g transform="translate(74, 134)">
    <rect width="48" height="18" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <text x="24" y="12" class="tag" fill="#8b949e" text-anchor="middle">MySQL</text>
  </g>

  <!-- Tag 3: MongoDB -->
  <g transform="translate(128, 134)">
    <rect width="60" height="18" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <text x="30" y="12" class="tag" fill="#8b949e" text-anchor="middle">MongoDB</text>
  </g>
</svg>
