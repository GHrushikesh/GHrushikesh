<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="280">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a14" />
      <stop offset="100%" stop-color="#04050a" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ea043" />
      <stop offset="100%" stop-color="#0969da" />
    </linearGradient>

    <radialGradient id="green-glow" cx="10%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#2ea043" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#2ea043" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="blue-glow" cx="90%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#0969da" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0969da" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <!-- Drop Shadow Filter for Code Card -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg-grad)" rx="16"/>

  <!-- Glow effects -->
  <rect width="900" height="280" fill="url(#green-glow)" rx="16"/>
  <rect width="900" height="280" fill="url(#blue-glow)" rx="16"/>

  <!-- Grid Overlay -->
  <rect width="900" height="280" fill="url(#grid)" rx="16"/>

  <!-- Left accent line -->
  <rect x="0" y="0" width="6" height="280" fill="url(#accent-grad)" rx="3"/>

  <!-- Content Group -->
  <g transform="translate(60, 75)">
    <!-- Developer Badge -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="125" height="24" rx="12" fill="#1f242c" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="12" r="4" fill="#2ea043"/>
      <text x="26" y="16" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">DEVELOPER</text>
    </g>

    <!-- Name -->
    <text x="0" y="72" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="800" letter-spacing="-0.5">
      Hrushikesh Gangajadiya
    </text>

    <!-- Description/Motto -->
    <text x="0" y="105" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400">
      Building developer tools &amp; exploring software systems
    </text>

    <!-- Accent Lines -->
    <line x1="0" y1="130" x2="100" y2="130" stroke="#2ea043" stroke-width="2" stroke-linecap="round"/>
    <line x1="110" y1="130" x2="130" y2="130" stroke="#0969da" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Code Card Window Mockup (Floating on the right side) -->
  <g transform="translate(520, 45)" filter="url(#shadow)">
    <!-- Card Base -->
    <rect width="320" height="190" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

    <!-- Title Bar -->
    <path d="M 1 12 A 11 11 0 0 1 12 1 L 308 1 A 11 11 0 0 1 319 12 L 319 32 L 1 32 Z" fill="#161b22"/>
    <line x1="0" y1="32" x2="320" y2="32" stroke="#30363d" stroke-width="1"/>

    <!-- Window Controls -->
    <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="32" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="48" cy="16" r="5" fill="#27c93f"/>

    <text x="304" y="20" fill="#8b949e" font-family="Consolas, 'Fira Code', Monaco, monospace" font-size="11" text-anchor="end">main.py</text>

    <!-- Code Snippet -->
    <g transform="translate(16, 50)" font-family="Consolas, 'Fira Code', Monaco, monospace" font-size="12">
      <!-- Line 1 -->
      <text x="0" y="15" fill="#f43f5e" font-weight="bold">def</text>
      <text x="28" y="15" fill="#58a6ff">build_systems</text>
      <text x="120" y="15" fill="#c9d1d9">():</text>

      <!-- Line 2 -->
      <text x="16" y="35" fill="#8b949e" font-style="italic"># Focus on high-quality code</text>

      <!-- Line 3 -->
      <text x="16" y="55" fill="#ff79c6">while</text>
      <text x="56" y="55" fill="#c9d1d9">learning:</text>

      <!-- Line 4 -->
      <text x="32" y="75" fill="#c9d1d9">solve_problems(</text>
      <text x="135" y="75" fill="#2ea043">"DSA"</text>
      <text x="170" y="75" fill="#c9d1d9">)</text>

      <!-- Line 5 -->
      <text x="32" y="95" fill="#c9d1d9">design_architecture()</text>

      <!-- Line 6 -->
      <text x="32" y="115" fill="#ff79c6">return</text>
      <text x="78" y="115" fill="#2ea043">"excellence"</text>
    </g>
  </g>
</svg>
