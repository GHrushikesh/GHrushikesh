<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #8b949e; line-height: 1.4; }
    .tag { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 9px; font-weight: 600; }
    .badge { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 9px; font-weight: 600; fill: #8b949e; }
  </style>

  <!-- Background -->
  <rect width="280" height="180" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  
  <!-- Accent top border -->
  <path d="M 1 10 A 9 9 0 0 1 10 1 L 270 1 A 9 9 0 0 1 279 10 L 279 4 L 1 4 Z" fill="#0969da"/>

  <!-- Icon and Header -->
  <!-- Git Branch Icon -->
  <g transform="translate(16, 20)" stroke="#0969da" stroke-width="1.5" fill="none">
    <circle cx="6" cy="6" r="2.5" fill="#0d1117"/>
    <circle cx="6" cy="18" r="2.5" fill="#0d1117"/>
    <circle cx="16" cy="10" r="2.5" fill="#0969da"/>
    <path d="M 6 8.5 L 6 15.5" />
    <path d="M 6 13 C 6 10, 10 10, 13.5 10" />
  </g>
  <text x="44" y="32" class="title">Smart Git Analyzer</text>
  
  <!-- Public Badge -->
  <rect x="222" y="21" width="42" height="16" rx="8" fill="#1f242c" stroke="#30363d" stroke-width="1"/>
  <text x="243" y="32" class="badge" text-anchor="middle">Public</text>

  <!-- Description -->
  <text x="16" y="65" class="desc">Automated repository scanner that</text>
  <text x="16" y="82" class="desc">analyzes commit history, patterns,</text>
  <text x="16" y="99" class="desc">and developer productivity metrics.</text>

  <!-- Divider -->
  <line x1="16" y1="122" x2="264" y2="122" stroke="#21262d" stroke-width="1"/>

  <!-- Tags -->
  <!-- Tag 1: Python -->
  <g transform="translate(16, 134)">
    <rect width="52" height="18" rx="4" fill="#1a3b23" stroke="#2ea043" stroke-width="0.5"/>
    <text x="26" y="12" class="tag" fill="#2ea043" text-anchor="middle">Python</text>
  </g>

  <!-- Tag 2: Git API -->
  <g transform="translate(74, 134)">
    <rect width="54" height="18" rx="4" fill="#132c4a" stroke="#58a6ff" stroke-width="0.5"/>
    <text x="27" y="12" class="tag" fill="#58a6ff" text-anchor="middle">Git API</text>
  </g>

  <!-- Tag 3: Analytics -->
  <g transform="translate(134, 134)">
    <rect width="66" height="18" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <text x="33" y="12" class="tag" fill="#8b949e" text-anchor="middle">Analytics</text>
  </g>
</svg>
